{# Keep in sync with eudi-wallet-it-python/integration_test/templates/qr_code.html #}
{% extends "base_shell.html" %}

{% block content %}
  <style>
    :root {
      --qr-size: {{ qrcode_size }}px;
      --brand-blue: #0072CE;
    }

    .qr-code {
      display: block;
      margin: auto;
      background-color: #fff;
      width: var(--qr-size);
      height: var(--qr-size);
    }

    .qr-code-img {
      width: 10em;
      height: 10em;
    }

    .qr-faded {
      opacity: 0.2;
    }

    .btn-custom {
      background-color: var(--brand-blue);
      color: white;
    }

    .support-link {
      margin-top: 0.5rem;
      display: block;
      color: var(--brand-blue);
    }
  </style>

  <div class="container py-5 text-center">

    <h1 id="content-title" class="h2 mb-4">
      <!-- i18next -->
    </h1>

    <p id="content-text" class="text-secondary small mb-4">
      <!-- i18next -->
    </p>

    <script src="{{ static }}js/qrcode/qr-code.js"></script>
    <div id="content-qrcode" class="d-flex justify-content-center mb-4">
      <div id="content-qrcode-payload">
        <qr-code
            contents="{{ qrcode_text }}"
            module-color="{{ qrcode_color }}"
            position-ring-color="{{ qrcode_color }}"
            position-center-color="{{ qrcode_color }}"
            class="qr-code"
            aria-label="Codice QR per l'autenticazione con IT-Wallet"
        >
          <img class="icon-qr-code" src="{{ static }}{{ qrcode_logo_path }}" slot="icon" alt="" />
        </qr-code>
      </div>
    </div>

    <p id="content-qrcode-info-text" class="text-muted mb-3" aria-live="polite" aria-atomic="true">
      <!-- i18next -->
    </p>

    <div id="content-function" class="mt-3">
      <button id="btn-back"
              type="button"
              class="btn btn-outline-primary"
              onclick="window.history.go(-1); return false;">
        <!-- i18next -->
      </button>
    </div>

    <noscript>
      <p id="noscript-message">Per usare la pagina del codice QR è necessario abilitare JavaScript.</p>
    </noscript>

    <script>
      let crossImg = "{{ static }}img/new_cross.svg";
      let connectedImg = "{{ static }}img/new_check.svg";
      let appImg = "{{ static }}img/app.svg";
      let expirationTime = parseInt("{{ qrcode_expiration_time }}", 10);
      let pollingInterval;
      let countdown = null;
      let countdownStarted = false;

      function newWindowHintText(t) {
        return t('footer.new_window_hint');
      }

      function setFooterLink($el, text, href, hint) {
        if (!$el.length) return;
        $el.text(text);
        if (href) $el.attr('href', href);
        $el.attr('aria-label', text + ' (' + hint + ')');
      }

      function updateTimerDisplay() {
        const timer = document.getElementById('timer');
        if (timer) {
          timer.textContent = String(Math.max(expirationTime, 0));
        }
      }

      function updateShellTexts(t) {
        $('#header-region-name').text(t('header.region_name'));
        $('.it-skip-links').attr('aria-label', t('skip_links.nav_label'));
        $('#skip-main').text(t('skip_links.main_content'));
        $('#skip-footer').text(t('skip_links.footer'));
        $('#eid-title').text(t('header.logo_alt'));
        $('#header-logo-text').text(t('header.logo_alt'));
        $('.qr-header-logo-wallet').attr('alt', t('header.wallet_brand_alt'));

        const hint = newWindowHintText(t);
        setFooterLink($('#footer-legal'), t('footer.legal_notice'), t('footer.legal_url'), hint);
        setFooterLink($('#footer-privacy'), t('footer.privacy_policy'), t('footer.privacy_url'), hint);
        setFooterLink($('#footer-accessibility'), t('footer.accessibility_statement'), t('footer.accessibility_url'), hint);
        $('#footer-legal-nav').attr('aria-label', t('footer.nav_label'));
        $('#noscript-message').text(t('noscript.message'));

        const pageTitle = t('page_title');
        $('#tab-title').text(pageTitle);
        document.title = pageTitle;
        $('#meta-description').attr('content', t('meta.description'));
      }

      function updateTexts(t) {
        updateShellTexts(t);
        $('#content-title').html('<b>' + t('contentTitle') + '</b>');
        $('#content-qrcode-info-text').html(
          t('qrCodeValidInfo', { seconds: String(Math.max(expirationTime, 0)) })
        );
        $('#content-text').html(t('supportText'));
        $('#btn-back').text(t('backLabel'));
      }

      function startCountdown(t) {
        if (countdownStarted) return;
        countdownStarted = true;
        countdown = setInterval(function () {
          expirationTime--;
          updateTimerDisplay();
          if (expirationTime < 0) {
            clearInterval(countdown);
            countdown = null;
            clearTimeout(pollingInterval);
            QRcodeExpired(t);
          }
        }, 1000);
      }

      function schedulePoll(t) {
        clearTimeout(pollingInterval);
        pollingInterval = setTimeout(function () {
          QRcodeScanCheck(t);
        }, 1000);
      }

      function stopTimers() {
        if (countdown) {
          clearInterval(countdown);
          countdown = null;
        }
        clearTimeout(pollingInterval);
      }

      function StartQRcodeScanCheck(t) {
        updateTexts(t);
        startCountdown(t);
        schedulePoll(t);
      }

      function onPollPending(t) {
        schedulePoll(t);
      }

      function initI18n() {
        const initialLang = localStorage.getItem('lang') || 'it';

        i18next
        .use(i18nextHttpBackend)
        .init({
          lng: initialLang,
          fallbackLng: 'it',
          backend: {
            loadPath: '{{ static }}locales/qr-{% raw %}{{lng}}{% endraw %}.json'
          }
        }, function (err, t) {
          if (err) {
            console.error("Error i18next:", err);
          }
          if (typeof initHeaderLangDropdown === 'function') {
            initHeaderLangDropdown(i18next, {
              afterLanguageChange: function (lng) {
                const code = (lng || 'it').split('-')[0];
                localStorage.setItem('lang', code === 'en' ? 'en' : 'it');
                updateTexts(i18next.t);
              }
            });
          }
          StartQRcodeScanCheck(t);
        });
      }

      function connectionCompleted(data) {
        stopTimers();
        changeTitle(i18next.t('connectedTitle'));
        changeQrCodeImg(connectedImg);
        changeQrCodeInfo(i18next.t('connectedText'));
        changeText('');
        $('#content-function').html(`
          <a href="${data.redirect_uri}" class="btn btn-primary btn-custom">
            ${i18next.t('clickAccessLabel')}
          </a>
        `);
      }

      function redirectToApp() {
        stopTimers();
        changeTitle(i18next.t('appTitle'));
        changeQrCodeImg(appImg);
        changeQrCodeInfo(i18next.t('appText'));
        changeText('');
        $('#content-function').addClass('d-none');
      }

      function QRcodeExpired(t) {
        blankQRcode();
        stopTimers();
        changeQrCodeInfo(t('qrCodeExpiredInfo'));
        $('#content-function').html(`
          <button id="qr-reload-btn" type="button" class="btn btn-primary">
            ${t('qrCodeReloadLabel')}
          </button>
        `);
        $('#qr-reload-btn').on('click', function () {
          window.location.reload(true);
        });
      }

      function errorPage(t) {
        stopTimers();
        changeTitle(i18next.t('failureTitle'));
        changeQrCodeImg(crossImg);
        changeQrCodeInfo(i18next.t('failureText'));
        changeText('');
        $('#content-function').html(`
          <button type="button" class="btn btn-outline-primary btn-custom" onclick="window.location.reload(true)">
            ${t('retryLabel')}
          </button>
          <br><br>
          <a href="#" onclick="return false;" class="support-link">
            ${t('contactSupportLabel')}
          </a>
        `);
      }

      function changeTitle(str) {
        $('#content-title').html(str);
      }

      function changeText(str) {
        $('#content-text').html(str);
      }

      function changeQrCodeInfo(str) {
        $('#content-qrcode-info-text').html(str);
      }

      function changeQrCodeImg(str) {
        $('#content-qrcode-payload').html(`<img src="${str}" alt="" class="qr-code-img" role="img">`);
      }

      function blankQRcode() {
        $('#content-qrcode-payload').addClass('qr-faded');
      }

      function statusEndpoint() {
        return "{{ status_endpoint }}";
      }

      function sessionIdentifier() {
        return "{{ state }}";
      }

      function QRcodeScanCheck(t) {
        $.ajax({
          type: 'GET',
          url: statusEndpoint(),
          data: {"id": sessionIdentifier()},
          statusCode: {
            201: function () {
              onPollPending(t);
            },
            202: function () {
              onPollPending(t);
            },
            200: connectionCompleted,
            400: function () {
              errorPage(i18next.t);
            },
            401: function () {
              errorPage(i18next.t);
            },
            403: function () {
              errorPage(i18next.t);
            },
            500: function () {
              errorPage(i18next.t);
            },
          }
        });
      }

      $(document).ready(function () {
        initI18n();
      });
    </script>
  </div>
{% endblock content %}
