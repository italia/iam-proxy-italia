{# Keep in sync with eudi-wallet-it-python/integration_test/templates/base_shell.html #}
<!DOCTYPE html>
<html lang="it" class="it-wallet-html">

<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title id="tab-title">Accedi</title>
  <meta name="description" id="meta-description" content="">
  <link rel="icon" href="{{ static }}spid/favicon-32x32.png">

  <link rel="stylesheet" href="{{ static }}css/style.css">
  <link href="{{ static }}css/bootstrap-italia.min.css" rel="stylesheet">
  <link href="{{ static }}css/ita.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next@25.5.2/i18next.min.js"></script>
  <script src="{{ static }}js/jquery-3.7.0.min.js"></script>
</head>

<body class="it-wallet-body">
  <nav class="it-skip-links" aria-label="Collegamenti di salto">
    <a id="skip-main" class="visually-hidden-focusable" href="#main-content">Vai al contenuto principale</a>
    <a id="skip-footer" class="visually-hidden-focusable" href="#page-footer">Vai al piè di pagina</a>
  </nav>

  <header class="it-header-wrapper" role="banner">
    <div class="it-header-slim-wrapper bg-primary">
      <div class="container">
        <div class="it-header-slim-wrapper-content d-flex justify-content-between align-items-center">
          <span class="navbar-brand text-white"><strong id="header-region-name"></strong></span>
          <div class="it-header-slim-right-zone">
            <div class="nav-item dropdown it-header-lang-dropdown">
              <button type="button" id="languagesDropButton" class="nav-link dropdown-toggle"
                aria-controls="language-menu"
                data-bs-toggle="dropdown" aria-haspopup="menu" aria-expanded="false">
                <span id="header-lang-active-hint" class="visually-hidden">lingua attiva:</span>
                <span class="it-header-lang-label" aria-hidden="true">ITA</span>
                <svg class="icon icon-sm ms-1" aria-hidden="true">
                  <use href="{{ static }}svg/sprites.svg#it-expand"></use>
                </svg>
              </button>
              <div id="language-menu" class="dropdown-menu dropdown-menu-end">
                <div class="row">
                  <div class="col-12">
                    <div class="link-list-wrapper">
                      <ul class="link-list" role="menu" aria-labelledby="languagesDropButton">
                        <li>
                          <button type="button" class="dropdown-item list-item it-lang-option active" data-lang="it"
                            role="menuitemradio" aria-checked="true" aria-current="true">
                            <span lang="it">Italiano</span>
                          </button>
                        </li>
                        <li>
                          <button type="button" class="dropdown-item list-item it-lang-option" data-lang="en"
                            role="menuitemradio" aria-checked="false">
                            <span lang="en">English</span>
                          </button>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="header-title-section">
      <div class="container py-3">
        <div class="d-flex align-items-center">
          <span id="eid-title" class="visually-hidden">Il tuo logo</span>
          <svg id="header-logo" class="it-header-logo-placeholder" role="img" aria-labelledby="eid-title"
            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" height="32" focusable="false">
            <text id="header-logo-text" class="it-header-logo-placeholder__text" x="0" y="28" aria-hidden="true">Il tuo logo</text>
          </svg>
          <span class="navbar-separator" aria-hidden="true"></span>
          <img src="{{ static }}img/IT-Wallet-Logo-Primary-BlueItalia.svg" alt="IT-Wallet"
            class="it-wallet-navbar-logo qr-header-logo-wallet" height="32" />
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" aria-labelledby="content-title">
    {% block content %}{% endblock %}
  </main>

  <footer id="page-footer" role="contentinfo" tabindex="-1">
    <div class="container h-100 d-flex align-items-center">
      <nav id="footer-legal-nav" class="d-flex flex-wrap justify-content-start" aria-label="Link legali">
        <a id="footer-legal" href="#" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-privacy" href="#" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-accessibility" href="#" class="text-white mb-2" target="_blank" rel="noopener"></a>
      </nav>
    </div>
  </footer>

  <script src="{{ static }}js/bootstrap-italia.bundle.min.js"></script>
  <script src="{{ static }}js/header-lang-dropdown.js"></script>
</body>

</html>
