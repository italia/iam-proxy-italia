<!DOCTYPE html>
<html lang="it">

<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title id="tab-title"></title>
  <meta name="description" content="">
  <link rel="shortcut icon" href="spid/favicon-32x32.png">

  <link rel="stylesheet" href="/static/css/style.css?v=wallet-ui-20260414">
  <link href="/static/css/bootstrap-italia.min.css" rel="stylesheet">
  <link href="/static/css/ita.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next@25.5.2/i18next.min.js"></script>
  <script src="js/bootstrap-italia.bundle.min.js"></script>
  <script src="js/header-lang-dropdown.js?v=wallet-ui-20260414"></script>
</head>

<body>
  <!-- HEADER (same structure as disco.html) -->
  <header class="it-header-wrapper">
    <div class="it-header-slim-wrapper bg-primary">
      <div class="container">
        <div class="it-header-slim-wrapper-content d-flex justify-content-between align-items-center">
          <span class="navbar-brand text-white"><strong id="header-region-name"></strong></span>
          <div class="it-header-slim-right-zone">
            <div class="nav-item dropdown it-header-lang-dropdown">
              <a href="#" id="languagesDropButton" role="button" class="nav-link dropdown-toggle"
                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <span class="visually-hidden">lingua attiva:</span>
                <span class="it-header-lang-label">ITA</span>
                <svg class="icon icon-sm ms-1 d-none d-lg-block" aria-hidden="true">
                  <use xlink:href="/static/svg/sprites.svg#it-expand"></use>
                </svg>
              </a>
              <div class="dropdown-menu dropdown-menu-end">
                <div class="row">
                  <div class="col-12">
                    <div class="link-list-wrapper">
                      <ul class="link-list" aria-labelledby="languagesDropButton">
                        <li>
                          <a class="dropdown-item list-item it-lang-option active" href="#" data-lang="it" role="button">
                            <span lang="it">Italiano</span>
                          </a>
                        </li>
                        <li>
                          <a class="dropdown-item list-item it-lang-option" href="#" data-lang="en" role="button">
                            <span lang="en">English</span>
                          </a>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="header-title-section">
      <div class="container py-3">
        <div class="d-flex align-items-center">
          <svg class="icon icon-lg" aria-hidden="true">
            <use xlink:href="/static/svg/sprites.svg#it-code-circle"></use>
          </svg>

          <span class="navbar-separator" aria-hidden="true"></span>
          
          <img src="img/IT-Wallet-Logo-Primary-BlueItalia.svg" alt="IT-Wallet" class="it-wallet-navbar-logo me-2" height="32">

        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container my-4 it-wallet-page">
    <div class="it-wallet-title-row">
      <a href="#" id="back-link" class="it-wallet-back-link">
        <svg class="icon icon-sm me-1" aria-hidden="true">
          <use href="/static/svg/sprites.svg#it-arrow-left"></use>
        </svg>
        <span>INDIETRO</span>
      </a>
      <h1 class="text-center mb-2" id="page-title">Scegli l'app</h1>
    </div>
    <p class="text-center mb-4 it-wallet-subtitle" id="page-subtitle">Seleziona il portafoglio digitale con cui proseguire</p>

    <section class="it-wallet-layout-surface">
      <div id="wallet-controls" class="it-wallet-controls mb-4">
        <div class="it-wallet-search-group">
          <input type="text" id="wallet-search" class="form-control" placeholder="Cerca per nome" aria-label="Cerca wallet per nome">
          <button class="it-wallet-search-clear d-none" type="button" id="search-clear-btn" aria-label="Reset ricerca">&times;</button>
        </div>
        <button class="btn btn-primary" type="button" id="search-btn">Cerca</button>
        <select id="wallet-sort" class="form-select" aria-label="Ordina wallet">
          <option value="default">Predefinito</option>
          <option value="az">Alfabetico A-Z</option>
          <option value="za">Alfabetico Z-A</option>
        </select>
      </div>

      <div id="wallet-grid" class="row g-4 justify-content-center align-items-start">
        <!-- Wallet cards rendered by it-wallet-loader.js -->
      </div>
    </section>
  </main>

  <!-- FOOTER (same structure as disco.html) -->
  <footer>
    <div class="container h-100 d-flex align-items-center">
      <div class="d-flex flex-wrap justify-content-start">
        <a id="footer-legal" href="" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-privacy" href="" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-accessibility" href="" class="text-white mb-2" target="_blank" rel="noopener"></a>
      </div>
    </div>
  </footer>

  <script type="module" src="js/it-wallet-loader.js?v=wallet-ui-20260414"></script>
</body>

</html>
