module: backends.spidsaml2.SpidSAMLBackend

name: spidSaml2
config:
  # idp_blacklist_file: /path/to/blacklist.json

  # error templates
  static_storage_url: !ENV SATOSA_BASE_STATIC
  error_template: "spid_login_error.html"
  template_folder: "templates" # project root

  # make metadata downloadable from entityid url
  entityid_endpoint: true

  spid_allowed_acrs:
    - https://www.spid.gov.it/SpidL1
    - https://www.spid.gov.it/SpidL2
    - https://www.spid.gov.it/SpidL3

  spid_acr_comparison: "minimum"

  acr_mapping:
    "": 'https://www.spid.gov.it/SpidL2'
    # specify AuthnContext per IdP
    # "https://identity.sieltecloud.it": 'https://www.spid.gov.it/SpidL1'
    # "https://idp.namirialtsp.com/idp": 'https://www.spid.gov.it/SpidL1'
    # "https://identity.infocert.it": 'https://www.spid.gov.it/SpidL1'

  sp_config:
    key_file: !ENV SATOSA_PRIVATE_KEY
    cert_file: !ENV SATOSA_PUBLIC_KEY
    encryption_keypairs:
    - {'key_file': !ENV SATOSA_PRIVATE_KEY, 'cert_file': !ENV SATOSA_PUBLIC_KEY}

    attribute_map_dir: 'attributes-map'

    organization:
      display_name:
        - [ !ENV SATOSA_ORGANIZATION_DISPLAY_NAME_EN, 'en']
        - [ !ENV SATOSA_ORGANIZATION_DISPLAY_NAME_IT, 'it']
      name:
        - [ !ENV SATOSA_ORGANIZATION_NAME_EN, 'en']
        - [ !ENV SATOSA_ORGANIZATION_NAME_IT, 'it']
      url:
        - [ !ENV SATOSA_ORGANIZATION_URL_EN, 'en']
        - [ !ENV SATOSA_ORGANIZATION_URL_IT, 'it']

    contact_person:
      - contact_type: 'other'
        given_name: !ENV SATOSA_CONTACT_PERSON_GIVEN_NAME
        email_address: !ENV SATOSA_CONTACT_PERSON_EMAIL_ADDRESS
        telephone_number: !ENV SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER
        FiscalCode: !ENV SATOSA_CONTACT_PERSON_FISCALCODE
        IPACode: !ENV SATOSA_CONTACT_PERSON_IPA_CODE
        Public: ''
        # PublicServicesFullAggregator: '' # nel caso di aggregatore di servizi
      # - {'contact_type': 'other', 'telephone_number': '+3984756344785', 'email_address': 'info@example.org', 'VATNumber': 'IT12345678901', 'FiscalCode': 'XYasdasdadasdGGJ000W', 'Private': '' }
      # - {'contact_type': 'billing', 'telephone_number': '+3984756344785', 'email_address': 'info@example.org', 'company': 'example s.p.a.', 'CodiceFiscale': 'NGLMRA80A01D086T', 'IdCodice': '983745349857', 'IdPaese': 'IT', 'Denominazione': 'Destinatario Fatturazione', 'Indirizzo': 'via tante cose', 'NumeroCivico': '12', 'CAP': '87100', 'Comune': 'Cosenza', 'Provincia': 'CS', 'Nazione': 'IT' }

      # nel caso di aggregatore di servizi
      # - contact_type: 'other'
      #   Public: ''
      #   IPACode: 'c_l102'
      #   company: 'Comune di Demo'
      #   Aggregated: ''

    metadata:
      local: [./metadata/idp/]
      # using pyFF or other MDX server
      # mdq:
          # cert: mdq.pem
    # --- FICEP / eIDAS ---------------------------------------------------
    # Quando True, in fase di generazione dei metadata (backends/spidsaml2.py
    # __create_metadata) vengono aggiunti i blocchi AttributeConsumingService /
    # AssertionConsumerService con index 99 e 100 (set di attributi FICEP/eIDAS),
    # oltre al blocco SPID standard con index 0.
    ficep_enable: True
    # entityID dell'IdP FICEP/eIDAS. Viene usato per riconoscere le richieste
    # dirette a questo IdP e applicare 'ficep_default_acs_index' (vedi sotto).
    ficep_entity_id: https://sp-proxy.eid.gov.it/spproxy/idpit
    # AttributeConsumingServiceIndex da inserire nella AuthnRequest SOLO quando
    # l'IdP di destinazione coincide con 'ficep_entity_id'. Indica all'IdP quale
    # set di attributi richiede l'SP, referenziando il blocco
    # <AttributeConsumingService index="99"> pubblicato nei metadata.
    # NB: non modifica l'AssertionConsumerServiceURL della richiesta, che resta
    # sempre il primo endpoint della lista 'assertion_consumer_service'.
    ficep_default_acs_index: 99

    entityid: '<base_url>/<name>/metadata'
    accepted_time_diff: 10

    # AttributeConsumingServiceIndex da inserire nella AuthnRequest.
    # Ordine di precedenza nella scelta del valore (vedi spidsaml2.authn_request):
    #   1. 'acs_index' (qui sotto), se valorizzato -> usato per TUTTE le richieste;
    #   2. altrimenti, se IdP == 'ficep_entity_id' -> 'ficep_default_acs_index' (99);
    #   3. altrimenti -> 'spid_default_acs_index' se presente, altrimenti "0".
    # Questo parametro seleziona il SET DI ATTRIBUTI richiesto (index del blocco
    # AttributeConsumingService nei metadata), NON l'AssertionConsumerService URL.
    #
    # NB (ridondanza voluta): le tre chiavi scrivono lo STESSO attributo
    # (attribute_consuming_service_index); differiscono solo per scope.
    # 'acs_index' è un override globale: se valorizzato rende inerti sia
    # 'ficep_default_acs_index' sia 'spid_default_acs_index'. Per le richieste
    # non-FICEP 'acs_index' e 'spid_default_acs_index' sono di fatto equivalenti.
    # 'spid_default_acs_index' non è dichiarato di default (fallback nel codice "0").
    # acs_index: 0
    # spid_default_acs_index: 0

    # --- AssertionConsumerService index (metadata) -----------------------
    # ATTENZIONE: NON confondere con 'acs_index'/'ficep_default_acs_index'/
    # 'spid_default_acs_index' qui sopra. Quelli, nonostante l'abbreviazione
    # "acs", riguardano l'ATTRIBUTEConsumingServiceIndex inviato nella
    # AuthnRequest (quale SET DI ATTRIBUTI chiedere all'IdP). Questa chiave
    # riguarda invece l'ASSERTIONConsumerService, cioè gli endpoint su cui l'IdP
    # rispedisce l'asserzione, e i relativi index pubblicati nei metadata.
    # Sono elementi SAML distinti, agiscono su artefatti distinti
    # (richiesta vs metadata) e non si sovrascrivono a vicenda.
    #
    # Override degli index (e dell'attributo isDefault) degli
    # AssertionConsumerService pubblicati nei metadata del SP.
    # La lista è allineata PER POSIZIONE agli endpoint definiti in
    # service.sp.endpoints.assertion_consumer_service (vedi sotto): la 1a voce
    # mappa il 1° ACS, la 2a il 2°, ecc.
    # Caso d'uso: quando il backend è aggregato da un soggetto aggregatore, i
    # singoli ACS devono puntare agli URL dell'aggregato mappati su index
    # specifici; impostando qui gli index (e gli URL negli endpoint) si ottiene
    # la mappatura richiesta.
    # Se omesso valgono i default storici: index '0' (isDefault) per il primo
    # ACS e, con ficep_enable=True, '99' e '100' per il secondo e terzo.
    # assertion_consumer_service_indexes:
    #   - index: 0
    #     is_default: true
    #   - index: 99
    #   - index: 100

    service:
      sp:
        ui_info:
          display_name:
            - lang: en
              text: !ENV SATOSA_UI_DISPLAY_NAME_EN
            - lang: it
              text: !ENV SATOSA_UI_DISPLAY_NAME_IT
          description:
            - lang: en
              text: !ENV SATOSA_UI_DESCRIPTION_EN
            - lang: it
              text: !ENV SATOSA_UI_DESCRIPTION_IT
          information_url:
            - lang: en
              text: !ENV SATOSA_UI_INFORMATION_URL_EN
            - lang: it
              text: !ENV SATOSA_UI_INFORMATION_URL_IT
          privacy_statement_url:
            - lang: en
              text: !ENV SATOSA_UI_PRIVACY_URL_EN
            - lang: it
              text: !ENV SATOSA_UI_PRIVACY_URL_IT
          keywords:
            - lang: it
              text: ["SPID Authentication Proxy", "SPID Service Provider IT"]
            - lang: en
              text: ["SPID Authentication Proxy", "SPID Service Provider EN"]
          logo:
            text: !ENV SATOSA_UI_LOGO_URL
            width: !ENV SATOSA_UI_LOGO_WIDTH
            height: !ENV SATOSA_UI_LOGO_HEIGHT

        # sign dig and enc
        authn_requests_signed: true
        want_response_signed: true
        want_assertions_signed: true

        signing_algorithm: "http://www.w3.org/2001/04/xmldsig-more#rsa-sha256"
        digest_algorithm: "http://www.w3.org/2001/04/xmlenc#sha256"

        # security
        only_use_keys_in_metadata: true

        # it depends by acr level, see spidsaml2.authn_request
        # force_authn: false

        name_id_format_allow_create: false
        name_id_format: 'urn:oasis:names:tc:SAML:2.0:nameid-format:transient'
        requested_attribute_name_format: 'urn:oasis:names:tc:SAML:2.0:attrname-format:basic'
        allow_unknown_attributes: true

        # in production different workers do not share the same storage!
        allow_unsolicited: true

        # this instantiate the attribute_consuming_service
        required_attributes: ['spidCode', 'name', 'familyName', 'fiscalNumber', 'email']
        requested_attributes: []
        #optional_attributes: ['gender',
        #                      'companyName',
        #                      'registeredOffice',
        #                      'ivaCode',
        #                      'idCard',
        #                      'digitalAddress',
        #                      'placeOfBirth',
        #                      'countyOfBirth',
        #                      'dateOfBirth',
        #                      'address',
        #                      'mobilePhone',
        #                      'expirationDate']

        endpoints:
          # Ogni tupla e' [URL, binding]: definisce solo location e binding
          # dell'AssertionConsumerService; l'attributo SAML "index" NON si
          # configura qui. Gli index pubblicati nei metadata (0, 99, 100) sono
          # impostati da backends/spidsaml2.py (__create_metadata):
          #   - index 0   -> set attributi SPID standard (is_default="true")
          #   - index 99  -> set attributi FICEP/eIDAS   (solo se ficep_enable)
          #   - index 100 -> set attributi FICEP/eIDAS   (solo se ficep_enable)
          # I segmenti di path "99"/"100" sono solo una convenzione di naming e
          # NON corrispondono automaticamente all'attributo index SAML.
          # La AuthnRequest usa SEMPRE il PRIMO endpoint (acs/post) come
          # AssertionConsumerServiceURL, a prescindere dall'index richiesto.
          assertion_consumer_service:
          - [<base_url>/<name>/acs/post, 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST']
          - [<base_url>/<name>/acs/99/post, 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST']
          - [<base_url>/<name>/acs/100/post, 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST']
          single_logout_service:
          - [<base_url>/<name>/ls/post/, 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST']
          discovery_response:
          - [<base_url>/<name>/disco, 'urn:oasis:names:tc:SAML:profiles:SSO:idp-discovery-protocol']

  # disco_srv must be defined if there is more than one IdP in the metadata specified above
  # disco_srv: change with $SATOSA_DISCO_SRV
  disco_srv: !ENV SATOSA_DISCO_SRV

