module: pyeudiw.satosa.backends.openid4vp.openid4vp.OpenID4VPBackend
name: OpenID4VP

config:

  ui:
    static_storage_url: !ENV SATOSA_BASE_STATIC
    template_folder: "templates" # project root
    qrcode_template: "qr_code.html"
    error_template: "error.html"
    error_url: !ENV SATOSA_UNKNOW_ERROR_REDIRECT_PAGE
    authorization_error_template: "authorization_error.html"

  endpoints:
    pre_request:
      module: pyeudiw.satosa.backends.openid4vp.endpoints.pre_request_endpoint
      class: PreRequestHandler
      path: /pre-request
    response:
      module: pyeudiw.satosa.backends.openid4vp.endpoints.response_endpoint
      class: ResponseHandler
      path: /response-uri
    request:
      module: pyeudiw.satosa.backends.openid4vp.endpoints.request_endpoint
      class: RequestHandler
      path: /request-uri
    status:
      module: pyeudiw.satosa.backends.openid4vp.endpoints.status_endpoint
      class: StatusHandler
      path: /status
    get_response:
      module: pyeudiw.satosa.backends.openid4vp.endpoints.get_response_endpoint
      class: GetResponseHandler
      path: /get_response

  qrcode:
    size: 250 # px
    color: '#000000'  # hex
    expiration_time: 120 # seconds
    logo_path: 'wallet-it/wallet-icon-blue.svg' # relative to static_storage_url

  response_code:
    sym_key: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef" # hex string of 64 characters

  security:
    wallet_attestation_required: true # enable wallet attestation interoperability; if missing it will be set to true by default

  jwt:
    default_sig_alg: ES256 # or RS256. Please note that this signature alg MUST be compliant with the private keys used for the signature. X.509 certificates MUST be therefore ECDSA using ES, and RSA using RS
    default_enc_alg: RSA-OAEP
    default_enc_enc: A256CBC-HS512
    default_exp: 6         # minutes
    enc_alg_supported: &enc_alg_supported
        - RSA-OAEP
        - RSA-OAEP-256
        - ECDH-ES
        - ECDH-ES+A128KW
        - ECDH-ES+A192KW
        - ECDH-ES+A256KW
    enc_enc_supported: &enc_enc_supported
        - A128CBC-HS256
        - A192CBC-HS384
        - A256CBC-HS512
        - A128GCM
        - A192GCM
        - A256GCM
    sig_alg_supported: &sig_alg_supported
        - RS256
        - RS384
        - RS512
        - ES256
        - ES384
        - ES512

  authorization:
    client_id: # this field if not set will be autopopulated using internal variables base_url and name using the following format: "<base_url>/<name>"
    auth_iss_id: # this field if not set will be set to client_id in the authz request
    url_scheme: haip
    scopes:
    - pid-sd-jwt:unique_id+given_name+family_name
    default_acr_value: https://www.spid.gov.it/SpidL2
    expiration_time: 5 # minutes
    aud: https://self-issued.me/v2
    response_mode: direct_post
    presentation_definition:
      id: global-presentation-definition-id
      input_descriptors:
      - id: input-specific-id
        purpose: Request presentation holding Power of Representation attestation
        format:
          dc+sd-jwt: {}
        constraints:
          fields:
          - path:
            - "$.vct"
            filter:
              const: urn:eu.europa.ec.eudi:por:1
      - id: another-input-specific-id
        purpose: Request first name and last name claims from PID attestation
        format:
          dc+sd-jwt: {}
        constraints:
          limit_disclosure: required
          fields:
            - path:
              - "$.vct"
              filter:
                type: string
                pattern: urn:eu.europa.ec.eudi:por:1
            - path:
              - "$.family_name"
            - path:
              - "$.given_name"

  duckle:
    dcql_query: &dcql_query >
      {"credentials":[{"id":"personal id data","format":"dc+sd-jwt","meta":{"vct_values":["https://trust-registry.eid-wallet.example.it/credentials/v1.0/personidentificationdata"]},"claims":[{"path":["given_name"]},{"path":["family_name"]}]},{"id":"wallet attestation","format":"mso_mdoc","meta":{"vct_values":["https://itwallet.registry.example.it/WalletAttestation"]},"claims":[{"path":["wallet_link"]},{"path":["wallet_name"]}]}]}


  user_attributes:
    unique_identifiers:
    - tax_id_code
    - unique_id
    - personal_administrative_number
    subject_id_random_value: CHANGEME!

  network:
    httpc_params: &httpc_params
      connection:
        ssl: true
      session:
        timeout: 6

