
# Template for django
x-django-build: &django-build
  context: ../
  dockerfile: iam-proxy-italia-project-demo-examples/spid_cie_oidc_django/Dockerfile

# Common template for Django project
x-django-common: &django-common
  working_dir: /django-project
  entrypoint: "sh /entrypoint.sh"
  networks:
    - iam-proxy-italia
  restart: unless-stopped

x-rp-demo-build: &demo-rp-build
  context: ../
  dockerfile: iam-proxy-italia-project-demo-examples/oidc_rp/oidc_rp.Dockerfile

x-rp-demo-common: &demo-rp-common
  working_dir: /rp-demo-project
  entrypoint: "sh /entrypoint.sh"
  networks:
    - iam-proxy-italia
  restart: unless-stopped

services:
  satosa-mongo:
    profiles:
      - demo
      - storage_mongo
      - mongoexpress
      - oidc
      - wallet
    image: mongo
    container_name: satosa-mongo
    environment:
      MONGO_INITDB_DATABASE: oidcop
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_DBUSER:-satosa}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_DBPASSWORD:-thatpassword}"
      TZ: "${TZ:-Europe/Rome}"
    volumes:
      - ./mongo/db:/data/db
      - ./mongo/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh
      # - mongodata:/data/db # to be used for external volumes
    ports:
      - '27017-27019:27017-27019'
    networks:
      - iam-proxy-italia
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "admin", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  satosa-mongo-express:
    profiles:
      - demo
      - mongoexpress
    image: mongo-express
    container_name: satosa-mongo-express
    ports:
      - 8082:8081
    depends_on:
      satosa-mongo:
          condition: service_healthy
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: "${EXPRESS_USER:-satosauser}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${EXPRESS_PASSWORD:-satosapw}"
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_DBUSER:-satosa}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_DBPASSWORD:-thatpassword}"
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_DBUSER:-satosa}:${MONGO_DBPASSWORD:-thatpassword}@${MONGO_URL:-satosa-mongo}:${MONGO_PORT:-27017}/
      TZ: "${TZ:-Europe/Rome}"
    networks:
      - iam-proxy-italia

  django_sp:
    profiles:
      - demo
      - dev
      - saml2
    image: ghcr.io/italia/iam-proxy-italia-djangosaml2_sp:v3.1.0
    build:
      context: ../
      args:
        - NODE_ENV=local
      dockerfile: iam-proxy-italia-project-demo-examples/django.Dockerfile
    environment:
      TZ: "${TZ:-UTC}"
    depends_on:
      iam-proxy-italia:
        condition: service_healthy
      satosa-nginx:
        condition: service_started
    container_name: django_sp
    working_dir: /django_sp
    entrypoint: "sh ../entrypoint.sh"
    volumes:
       - ./djangosaml2_sp:/django_sp:rw
    ports:
      - "8000:8000"
    networks:
      - iam-proxy-italia

  iam-proxy-italia:
    image: ghcr.io/italia/iam-proxy-italia:3.2.0
    build:
        context: ../
        args:
            - NODE_ENV=local
        dockerfile: Dockerfile
    container_name: iam-proxy-italia
    depends_on:
        trust-anchor:
          condition: service_healthy
          required: false  # only when profile demo/storage_mongo/oidc is used
        cie-provider:
          condition: service_healthy
          required: false  # only when profile demo/storage_mongo/oidc is used
    stdin_open: ${SATOSA_DEBUG:-false}   # enables PDB when attach to the compose
    tty: ${SATOSA_DEBUG:-false}   # enables PDB when attach to the compose
    environment:
      - TZ=${TZ:-Europe/Rome}
      - SATOSA_DEBUG=${SATOSA_DEBUG:-false}
      - SATOSA_BY_DOCKER=1
      - SATOSA_GET_IDEM_MDQ_KEY=${SATOSA_GET_IDEM_MDQ_KEY:-true}
      - SATOSA_GET_SPID_IDP_METADATA=${SATOSA_GET_SPID_IDP_METADATA:-true}
      - SATOSA_GET_FICEP_IDP_METADATA=${SATOSA_GET_FICEP_IDP_METADATA:-true}
      - SATOSA_GET_CIE_IDP_METADATA=${SATOSA_GET_CIE_IDP_METADATA:-true}

      - BASE_DIR=/satosa_proxy
      - SATOSA_HOSTNAME=${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}
      - SATOSA_PRIVATE_KEY=${SATOSA_KEYS_FOLDER:-./pki}/${SATOSA_PRIVATE_KEY_FILENAME:-privkey.pem}
      - SATOSA_PUBLIC_KEY=${SATOSA_KEYS_FOLDER:-./pki}/${SATOSA_PUBLIC_KEY_FILENAME:-cert.pem}
      - SATOSA_BASE=https://${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}
      - SATOSA_BASE_STATIC=${SATOSA_BASE}/static
      - SATOSA_DISCO_SRV=${SATOSA_BASE_STATIC}/disco.html
      - SATOSA_UNKNOW_ERROR_REDIRECT_PAGE=${SATOSA_BASE_STATIC}/error_page.html
      # CONFIGURATION ENDPOINT (defaults from env.example when void)
      - FEDERATION_RESOLVE_ENDPOINT=${FEDERATION_RESOLVE_ENDPOINT:-resolve}
      - SAMPLE_CIE_LOGO_URI=${SATOSA_BASE_STATIC}/${SAMPLE_CIE_LOGO_URI:-cie/sample-cie-logo.png}
      - FEDERATION_LEGAL_INFORMATION_URI=${FEDERATION_LEGAL_INFORMATION_URI:-en/website/legal-information}
      - OPENID_RP_CLIENT_ID=${OPENID_RP_CLIENT_ID:-https://${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}/CieOidcRp}
      - OPENID_RP_JWKS_URI=${OPENID_RP_JWKS_URI:-openid_relying_party/jwks.json}
      - OPENID_RP_SIGNED_JWKS_URI=${OPENID_RP_SIGNED_JWKS_URI:-openid_relying_party/jwks.jose}
      - OPENID_RP_CALLBACK_URI=${OPENID_RP_CALLBACK_URI:-oidc/callback}
      # END CONFIGURATION ENDPOINT
      # MongoDB: four component-specific env sets (CIE OIDC backend, OpenID4VP backend, oidcop frontend, OpenID4VCI frontend).
      # For single MongoDB, set MONGO_URL/MONGO_PORT/MONGO_DBUSER/MONGO_DBPASSWORD; component vars fall back to these.
      # See docs/mongodb-env.md
      - MONGO_CIE_OIDC_BACKEND_HOST=mongodb://${MONGO_CIE_OIDC_BACKEND_URL:-${MONGO_URL:-satosa-mongo}}:${MONGO_CIE_OIDC_BACKEND_PORT:-${MONGO_PORT:-27017}}
      - MONGO_CIE_OIDC_BACKEND_DB_NAME=${MONGO_CIE_OIDC_BACKEND_DB_NAME:-cie_oidc}
      - MONGO_CIE_OIDC_BACKEND_AUTH_COLLECTION=${MONGO_CIE_OIDC_BACKEND_AUTH_COLLECTION:-cie_oidc_authentication}
      - MONGO_CIE_OIDC_BACKEND_TOKEN_COLLECTION=${MONGO_CIE_OIDC_BACKEND_TOKEN_COLLECTION:-cie_oidc_authentication_token}
      - MONGO_CIE_OIDC_BACKEND_USER_COLLECTION=${MONGO_CIE_OIDC_BACKEND_USER_COLLECTION:-cie_oidc_users}
      - MONGODB_CIE_OIDC_BACKEND_USERNAME=${MONGO_CIE_OIDC_BACKEND_DBUSER:-${MONGO_DBUSER:-satosa}}
      - MONGODB_CIE_OIDC_BACKEND_PASSWORD=${MONGO_CIE_OIDC_BACKEND_DBPASSWORD:-${MONGO_DBPASSWORD:-thatpassword}}

      - MONGO_PYEUDIW_OPENID4VP_HOST=mongodb://${MONGO_PYEUDIW_OPENID4VP_URL:-${MONGO_URL:-satosa-mongo}}:${MONGO_PYEUDIW_OPENID4VP_PORT:-${MONGO_PORT:-27017}}
      - MONGODB_PYEUDIW_OPENID4VP_USERNAME=${MONGO_PYEUDIW_OPENID4VP_DBUSER:-${MONGO_DBUSER:-satosa}}
      - MONGODB_PYEUDIW_OPENID4VP_PASSWORD=${MONGO_PYEUDIW_OPENID4VP_DBPASSWORD:-${MONGO_DBPASSWORD:-thatpassword}}

      - MONGO_OIDCOP_HOST=mongodb://${MONGO_OIDCOP_URL:-${MONGO_URL:-satosa-mongo}}:${MONGO_OIDCOP_PORT:-${MONGO_PORT:-27017}}
      - MONGODB_OIDCOP_USERNAME=${MONGO_OIDCOP_DBUSER:-${MONGO_DBUSER:-satosa}}
      - MONGODB_OIDCOP_PASSWORD=${MONGO_OIDCOP_DBPASSWORD:-${MONGO_DBPASSWORD:-thatpassword}}

      - MONGO_PYEUDIW_OPENID4VCI_HOST=mongodb://${MONGO_PYEUDIW_OPENID4VCI_URL:-${MONGO_URL:-satosa-mongo}}:${MONGO_PYEUDIW_OPENID4VCI_PORT:-${MONGO_PORT:-27017}}
      - MONGODB_PYEUDIW_OPENID4VCI_USERNAME=${MONGO_PYEUDIW_OPENID4VCI_DBUSER:-${MONGO_DBUSER:-satosa}}
      - MONGODB_PYEUDIW_OPENID4VCI_PASSWORD=${MONGO_PYEUDIW_OPENID4VCI_DBPASSWORD:-${MONGO_DBPASSWORD:-thatpassword}}

      - SATOSA_ENCRYPTION_KEY=${SATOSA_ENCRYPTION_KEY:-CHANGE_ME!}
      - SATOSA_SALT=${SATOSA_SALT:-CHANGE_ME!}
      - SATOSA_STATE_ENCRYPTION_KEY=${SATOSA_STATE_ENCRYPTION_KEY:-CHANGE_ME!}

      - SATOSA_CONTACT_PERSON_EMAIL_ADDRESS=${SATOSA_CONTACT_PERSON_EMAIL_ADDRESS:-support.example@organization.org}
      - SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER=${SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER:-+3906123456789}
      - SATOSA_CONTACT_PERSON_FISCALCODE=${SATOSA_CONTACT_PERSON_FISCALCODE:-XXXXXX00X00X000Y}
      - SATOSA_CONTACT_PERSON_GIVEN_NAME=${SATOSA_CONTACT_PERSON_GIVEN_NAME:-Contact Me}
      - SATOSA_CONTACT_PERSON_IPA_CODE=${SATOSA_CONTACT_PERSON_IPA_CODE:-ipa00c}
      - SATOSA_CONTACT_PERSON_MUNICIPALITY=${SATOSA_CONTACT_PERSON_MUNICIPALITY:-H501}
      - SATOSA_ORGANIZATION_DISPLAY_NAME_EN=${SATOSA_ORGANIZATION_DISPLAY_NAME_EN:-Example Organization}
      - SATOSA_ORGANIZATION_DISPLAY_NAME_IT=${SATOSA_ORGANIZATION_DISPLAY_NAME_IT:-Example Organization}
      - SATOSA_ORGANIZATION_NAME_EN=${SATOSA_ORGANIZATION_NAME_EN:-example_organization}
      - SATOSA_ORGANIZATION_NAME_IT=${SATOSA_ORGANIZATION_NAME_IT:-example_organization}
      - SATOSA_ORGANIZATION_URL_EN=${SATOSA_ORGANIZATION_URL_EN:-https://example_organization.org}
      - SATOSA_ORGANIZATION_URL_IT=${SATOSA_ORGANIZATION_URL_IT:-https://example_organization.org/it}
      - SATOSA_UI_DESCRIPTION_EN=${SATOSA_UI_DESCRIPTION_EN:-Resource description}
      - SATOSA_UI_DESCRIPTION_IT=${SATOSA_UI_DESCRIPTION_IT:-Resource description}
      - SATOSA_UI_DISPLAY_NAME_EN=${SATOSA_UI_DISPLAY_NAME_EN:-Resource Display Name}
      - SATOSA_UI_DISPLAY_NAME_IT=${SATOSA_UI_DISPLAY_NAME_IT:-Resource Display Name}
      - SATOSA_UI_INFORMATION_URL_EN=${SATOSA_UI_INFORMATION_URL_EN:-https://example_organization.org/information_url}
      - SATOSA_UI_INFORMATION_URL_IT=${SATOSA_UI_INFORMATION_URL_IT:-https://example_organization.org/it/information_url}
      - SATOSA_UI_LOGO_HEIGHT=${SATOSA_UI_LOGO_HEIGHT:-60}
      - SATOSA_UI_LOGO_WIDTH=${SATOSA_UI_LOGO_WIDTH:-80}
      - SATOSA_UI_LOGO_URL=${SATOSA_UI_LOGO_URL:-https://example_organization.org/logo.png}
      - SATOSA_UI_PRIVACY_URL_EN=${SATOSA_UI_PRIVACY_URL_EN:-https://example_organization.org/privacy}
      - SATOSA_UI_PRIVACY_URL_IT=${SATOSA_UI_PRIVACY_URL_IT:-https://example_organization.org/it/privacy}
      - SATOSA_USER_ID_HASH_SALT=${SATOSA_USER_ID_HASH_SALT:-CHANGE_ME!}

      - PYEUDIW_FEDERATION_CLIENT_ID=${PYEUDIW_FEDERATION_CLIENT_ID:-openid_federation:https://${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}/OpenID4VP}
      - PYEUDIW_X509_CLIENT_ID=${PYEUDIW_X509_CLIENT_ID:-x509_san_dns:${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}}
    expose:
      - 10000
    ports:
      - "10000:10000"
    volumes:
      - ./iam-proxy-italia-project:/satosa_proxy:rwx
      - ./pyeudiw-healthcheck.sh:/satosa_proxy/pyeudiw-healthcheck.sh:ro
      # - ./eudi-wallet-it-python/pyeudiw:/.venv/lib/python3.12/site-packages/pyeudiw:rwx
      # - iam-proxy-italia-data:/satosa_proxy # to be used for external volumes
    working_dir: /satosa_proxy
    entrypoint: "sh entrypoint.sh"
    networks:
      - iam-proxy-italia
    healthcheck:
      test: ["CMD", "sh", "pyeudiw-healthcheck.sh"]
      interval: 30s
      retries: 10
      start_period: 30s
      timeout: 10s

  satosa-nginx:
    image: nginx:alpine
    container_name: satosa-nginx
    depends_on:
      iam-proxy-italia:
        condition: service_started
      satosa-certbot:
        condition: service_completed_successfully
    ports:
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./certbot/archive:/etc/archive:ro
      - ./certbot/live/${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}:/etc/nginx/certs:ro
      # - static:/usr/share/nginx/html # to be used for external volumes
    networks:
      iam-proxy-italia:
        aliases:
          - ${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}
    environment:
      - NGINX_HOST=${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}
      - TZ=${TZ:-Europe/Rome}

  spid-samlcheck:
    profiles:
      - demo
      - dev
      - saml2
    image: italia/spid-saml-check:1.11.1
    container_name: spid-samlcheck
    ports:
      - "8443:8443"
    networks:
      - iam-proxy-italia

  satosa-certbot:
    image: certbot/certbot
    container_name: satosa-certbot
    environment:
      - CERTBOT_ENABLED=${SATOSA_CERTBOT_ENABLED:-true}
      - CERTBOT_EMAIL=${SATOSA_CONTACT_PERSON_EMAIL_ADDRESS:-support.example@organization.org}
      - HOSTNAME=${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}
      - CERT_METHOD=${CERT_METHOD:-local}
      - CERTBOT_KTY=${CERTBOT_KTY:-3072}
      - CERTBOT_DAYS=${CERTBOT_DAYS:-3650}
      - TZ=${TZ:-Europe/Rome}
    volumes:
      - ./certbot:/etc/letsencrypt
      - ./nginx/html:/var/www/certbot
    networks:
      - iam-proxy-italia
    ports:
      - "80:80"
    entrypoint: "sh /etc/letsencrypt/certbot.sh"

  trust-anchor:
    profiles:
      - demo
      - storage_mongo
      - oidc
    <<: *django-common
    container_name: trust-anchor
    build:
      <<: *django-build
      args:
        MODULE_NAME: federation_authority
        RUNNING_PORT: 5002
    ports:
      - "5002:5002"
    volumes:
      - ./spid_cie_oidc_django/federation_authority:/django-project:rw
    networks:
      iam-proxy-italia:
        aliases:
          - ${TRUST_ANCHOR_HOSTNAME:-trust-anchor.example.org}
    healthcheck:
      test: [ "CMD", "/bin/bash", "/healthcheck.sh", "http://${TRUST_ANCHOR_HOSTNAME:-trust-anchor.example.org}:5002"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      TRUST_ANCHOR_URL: ${TRUST_ANCHOR_URL:-http://trust-anchor.example.org:5002}
      PROVIDER_URL: ${PROVIDER_URL:-http://cie-provider.example.org:8002}
      RP_URL: "https://${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}/CieOidcRp"

  cie-provider:
    profiles:
      - demo
      - storage_mongo
      - oidc
    <<: *django-common
    container_name: cie-provider
    build:
      <<: *django-build
      args:
        MODULE_NAME: provider
        RUNNING_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ./spid_cie_oidc_django/provider:/django-project
    networks:
      iam-proxy-italia:
        aliases:
          - ${CIE_PROVIDER_HOSTNAME:-cie-provider.example.org}
    depends_on:
      - trust-anchor
    healthcheck:
      test: [ "CMD", "/bin/bash", "/healthcheck.sh" , "http://${CIE_PROVIDER_HOSTNAME:-cie-provider.example.org}:8002/oidc/op"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      TRUST_ANCHOR_URL: ${TRUST_ANCHOR_URL:-http://trust-anchor.example.org:5002}
      PROVIDER_URL: ${PROVIDER_URL:-http://cie-provider.example.org:8002}
      RP_URL: "https://${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}/CieOidcRp"

  # Fills demo data (oidcop DB, user, indexes, test client jbxedfmfyc).
  # Always runs at startup when stack is brought up (run-docker-compose.sh forces re-run).
  # See docs/demo-oidc-rp.md (section "Insert a new client (new RP)").
  relying-party-demo-mongo:
    profiles:
      - demo
      - storage_mongo
      - oidc
    build:
      <<: *demo-rp-build
    container_name: relying-party-demo-mongo
    working_dir: /rp-demo-project
    entrypoint: ["python3", "init_oidcop_mongo.py"]
    restart: "no"
    depends_on:
      satosa-mongo:
        condition: service_healthy
    networks:
      - iam-proxy-italia
    environment:
      MONGO_URL: "${MONGO_URL:-satosa-mongo}"
      MONGO_PORT: "${MONGO_PORT:-27017}"
      MONGO_DBUSER: "${MONGO_DBUSER:-satosa}"
      MONGO_DBPASSWORD: "${MONGO_DBPASSWORD:-thatpassword}"
      MONGO_INITDB_DATABASE: "${MONGO_INITDB_DATABASE:-oidcop}"
      # OIDC RP Demo test client (see docs/demo-oidc-rp.md)
      OIDC_RP_DEMO_CLIENT_ID: "${OIDC_RP_DEMO_CLIENT_ID:-jbxedfmfyc}"
      OIDC_RP_DEMO_CLIENT_SECRET: "${OIDC_RP_DEMO_CLIENT_SECRET:-19cc69b70d0108f630e52f72f7a3bd37ba4e11678ad1a7434e9818e1}"
      OIDC_RP_DEMO_REDIRECT_URI: "http://${DEMO_RELYING_PARTY_FQDN:-localhost:8090}/authz_cb/satosa"
      OIDC_RP_DEMO_POST_LOGOUT_REDIRECT_URI: "https://${DEMO_RELYING_PARTY_FQDN:-localhost:8090}/session_logout/satosa"
      OIDC_RP_DEMO_OP_BASE_URL: "https://${SATOSA_HOSTNAME:-iam-proxy-italia.example.org}"
      OIDC_RP_DEMO_CLIENT_NAME: "${OIDC_RP_DEMO_CLIENT_NAME:-ciro}"
      OIDC_RP_DEMO_CLIENT_SALT: "${OIDC_RP_DEMO_CLIENT_SALT:-6flfsj0Z}"
      OIDC_RP_DEMO_REGISTRATION_ACCESS_TOKEN: "${OIDC_RP_DEMO_REGISTRATION_ACCESS_TOKEN:-z3PCMmC1HZ1QmXeXGOQMJpWQNQynM4xY}"
      OIDC_RP_DEMO_CLIENT_CONTACTS: "${OIDC_RP_DEMO_CLIENT_CONTACTS:-ops@example.com}"
      OIDC_RP_DEMO_ALLOWED_SCOPES: "${OIDC_RP_DEMO_ALLOWED_SCOPES:-openid,profile,email,offline_access}"
      TZ: "${TZ:-Europe/Rome}"

  relying-party-demo:
    profiles:
      - demo
      - storage_mongo
      - oidc
    <<: *demo-rp-common
    container_name: relying-party-demo
    build:
      <<: *demo-rp-build
    ports:
      - "8090:8090"
    networks:
      iam-proxy-italia:
        aliases:
          - demo-rp.example.org
    depends_on:
      iam-proxy-italia:
        condition: service_healthy
    environment:
      HOST: relying-party-demo
      RUNNING_PORT: 8090
      # Must be a full URL (https://...). Use WELL_KNOW_OPENID_CONFIGURATION in .env to override.
      WELL_KNOW_OPENID_CONFIGURATION: "${WELL_KNOW_OPENID_CONFIGURATION:-https://iam-proxy-italia.example.org/OIDCOP/.well-known/openid-configuration}"
      # OIDC RP Demo (see docs/demo-oidc-rp.md) — must match client in MongoDB
      OIDC_RP_DEMO_CLIENT_ID: "${OIDC_RP_DEMO_CLIENT_ID:-jbxedfmfyc}"
      OIDC_RP_DEMO_CLIENT_SECRET: "${OIDC_RP_DEMO_CLIENT_SECRET:-19cc69b70d0108f630e52f72f7a3bd37ba4e11678ad1a7434e9818e1}"
      OIDC_RP_DEMO_REDIRECT_URI: "http://${DEMO_RELYING_PARTY_FQDN:-localhost:8090}/authz_cb/satosa"
      URL_CALLBACK: "${OIDC_RP_DEMO_REDIRECT_URI:-http://${DEMO_RELYING_PARTY_FQDN:-localhost:8090}/authz_cb/satosa}"
      URL_REDIRECT: "http://${DEMO_RELYING_PARTY_FQDN:-localhost:8090}/"
      SCOPE: "openid profile email offline_access"
      CLIENT_ID: "${OIDC_RP_DEMO_CLIENT_ID:-jbxedfmfyc}"
      CLIENT_SECRET: "${OIDC_RP_DEMO_CLIENT_SECRET:-19cc69b70d0108f630e52f72f7a3bd37ba4e11678ad1a7434e9818e1}"


networks:
  iam-proxy-italia:
    name: iam-proxy-italia
    # external: true prevents network removal on "compose down", avoiding host
    # network interface teardown that can disconnect the machine from the internet
    external: true

## External volumes
# volumes:
#   mongodata:
#     name: iam-proxy-italia_mongodata
#     external: true
#   nginx_certs:
#     name: iam-proxy-italia_nginx_certs
#     external: true
#   iam-proxy-italia:
#     name: iam-proxy-italia-data
#     external: true
#   static:
#     name: iam-proxy-italia-static
#     external: true
