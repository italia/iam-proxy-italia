
# Template for django
x-django-build: &django-build
  context: ../
  dockerfile: iam-proxy-italia-project-demo-examples/spid_cie_oidc_django/Dockerfile

# Common template for Django project
x-django-common: &django-common
  working_dir: /django-project
  entrypoint: "sh /entrypoint.sh"
  networks:
    - iam-proxy-italia
  restart: unless-stopped

x-rp-demo-build: &demo-rp-build
  context: ../
  dockerfile: iam-proxy-italia-project-demo-examples/oidc_rp/oidc_rp.Dockerfile

x-rp-demo-common: &demo-rp-common
  working_dir: /rp-demo-project
  entrypoint: "sh /entrypoint.sh"
  networks:
    - iam-proxy-italia
  restart: unless-stopped

services:
  satosa-mongo:
    profiles:
      - demo
      - mongo
      - mongoexpress
    image: mongo
    container_name: satosa-mongo
    environment:
      MONGO_INITDB_DATABASE: oidcop
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_DBUSER:-satosa}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_DBPASSWORD:-thatpassword}"
      TZ: "${TZ:-Europe/Rome}"
    volumes:
      - ./mongo/db:/data/db
      - ./mongo/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh
      # - mongodata:/data/db # to be used for external volumes
    ports:
      - '27017-27019:27017-27019'
    networks:
      - iam-proxy-italia
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "admin", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  satosa-mongo-express:
    profiles:
      - demo
      - mongoexpress
    image: mongo-express
    container_name: satosa-mongo-express
    ports:
      - 8082:8081
    depends_on:
      satosa-mongo:
          condition: service_healthy
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: "${EXPRESS_USER:-satosauser}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${EXPRESS_PASSWORD:-satosapw}"
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_DBUSER:-satosa}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_DBPASSWORD:-thatpassword}"
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_DBUSER:-satosa}:${MONGO_DBPASSWORD:-thatpassword}@${MONGO_URL:-satosa-mongo}:${MONGO_PORT:-27017}/
      TZ: "${TZ:-Europe/Rome}"
    networks:
      - iam-proxy-italia

  django_sp:
    profiles:
      - demo
      - dev
    image: ghcr.io/italia/iam-proxy-italia-djangosaml2_sp:latest
    build:
      context: ../
      args:
        - NODE_ENV=local
      dockerfile: iam-proxy-italia-project-demo-examples/django.Dockerfile
    depends_on:
      iam-proxy-italia:
        condition: service_healthy
      satosa-nginx:
        condition: service_started
    container_name: django_sp
    working_dir: /django_sp
    entrypoint: "sh ../entrypoint.sh"
    volumes:
       - ./djangosaml2_sp:/django_sp:rw
    ports:
      - "8000:8000"
    networks:
      - iam-proxy-italia

  iam-proxy-italia:
    # image: ghcr.io/italia/iam-proxy-italia:latest
    image: iam-proxy-italia:3.1.0
    build:
        context: ../
        args:
            - NODE_ENV=local
        dockerfile: Dockerfile
    container_name: iam-proxy-italia
    depends_on:
        trust-anchor:
          condition: service_healthy
        cie-provider:
          condition: service_healthy
    stdin_open: ${SATOSA_DEBUG:-false}   # enables PDB when attach to the compose
    tty: ${SATOSA_DEBUG:-false}   # enables PDB when attach to the compose
    environment:
      - TZ=${TZ:-Europe/Rome}
      - SATOSA_DEBUG=${SATOSA_DEBUG:-false}
      - SATOSA_BY_DOCKER=1
      - SATOSA_GET_IDEM_MDQ_KEY=${SATOSA_GET_IDEM_MDQ_KEY:-true}
      - SATOSA_GET_SPID_IDP_METADATA=${SATOSA_GET_SPID_IDP_METADATA:-true}
      - SATOSA_GET_FICEP_IDP_METADATA=${SATOSA_GET_FICEP_IDP_METADATA:-true}
      - SATOSA_GET_CIE_IDP_METADATA=${SATOSA_GET_CIE_IDP_METADATA:-true}

      - BASE_DIR=/satosa_proxy
      - SATOSA_PRIVATE_KEY=${SATOSA_KEYS_FOLDER:-./pki}/${SATOSA_PRIVATE_KEY_FILENAME:-privkey.pem}
      - SATOSA_PUBLIC_KEY=${SATOSA_KEYS_FOLDER:-./pki}/${SATOSA_PUBLIC_KEY_FILENAME:-cert.pem}
      - SATOSA_BASE=https://${SATOSA_HOSTNAME:-localhost}
      - SATOSA_BASE_STATIC=${SATOSA_BASE}/static
      - SATOSA_DISCO_SRV=${SATOSA_BASE_STATIC}/disco.html
      - SATOSA_UNKNOW_ERROR_REDIRECT_PAGE=${SATOSA_BASE_STATIC}/error_page.html
      # CONFIGURATION ENDPOINT
      - FEDERATION_RESOLVE_ENDPOINT=${FEDERATION_RESOLVE_ENDPOINT}
      - SAMPLE_CIE_LOGO_URI=${SATOSA_BASE_STATIC}/${SAMPLE_CIE_LOGO_URI}
      - FEDERATION_LEGAL_INFORMATION_URI=${FEDERATION_LEGAL_INFORMATION_URI}
      - OPENID_RP_CLIENT_ID=${OPENID_RP_CLIENT_ID}
      - OPENID_RP_JWKS_URI=${OPENID_RP_JWKS_URI}
      - OPENID_RP_SIGNED_JWKS_URI=${OPENID_RP_SIGNED_JWKS_URI}
      - OPENID_RP_CALLBACK_URI=${OPENID_RP_CALLBACK_URI}
      # END CONFIGURATION ENDPOINT
      - MONGODB_USERNAME=${MONGO_DBUSER:-satosa}
      - MONGODB_PASSWORD=${MONGO_DBPASSWORD:-thatpassword}
      - MONGO_HOST=${MONGO_HOST:-satosa-mongo}:${MONGO_PORT:-27017}

      - MONGO_BACKEND_HOST=mongodb://${MONGO_BACKEND_URL:-satosa-mongo}:${MONGO_BACKEND_PORT:-27017}
      - MONGO_BACKEND_DB_NAME_OIDC_SCHEMA=${MONGO_DB_BACKEND_OIDC_NAME:-cie_oidc}
      - MONGO_BACKEND_AUTH_OIDC_COLLECTION=${MONGO_BACKEND_AUTH_OIDC_COLLECTION:-cie_oidc_authentication}
      - MONGO_BACKEND_TOKEN_OIDC_COLLECTION=${MONGO_BACKEND_TOKEN_OIDC_COLLECTION:-cie_oidc_authentication_token}
      - MONGO_BACKEND_USER_OIDC_COLLECTION=${MONGO_BACKEND_USER_OIDC_COLLECTION:-cie_oidc_users}
      - MONGODB_BACKEND_USERNAME=${MONGO_BACKEND_DBUSER:-satosa}
      - MONGODB_BACKEND_PASSWORD=${MONGO_BACKEND_DBPASSWORD:-thatpassword}

      - MONGO_FRONTEND_HOST=mongodb://${MONGO_FRONTEND_URL:-satosa-mongo}:${MONGO_FRONTEND_PORT:-27017}
      - MONGODB_FRONTEND_USERNAME=${MONGO_FRONTEND_DBUSER:-satosa}
      - MONGODB_FRONTEND_PASSWORD=${MONGO_FRONTEND_DBPASSWORD:-thatpassword}

      - SATOSA_ENCRYPTION_KEY=${SATOSA_ENCRYPTION_KEY:-CHANGE_ME!}
      - SATOSA_SALT=${SATOSA_SALT:-CHANGE_ME!}
      - SATOSA_STATE_ENCRYPTION_KEY=${SATOSA_STATE_ENCRYPTION_KEY:-CHANGE_ME!}

      - SATOSA_CONTACT_PERSON_EMAIL_ADDRESS=${SATOSA_CONTACT_PERSON_EMAIL_ADDRESS:-support.example@organization.org}
      - SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER=${SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER:-+3906123456789}
      - SATOSA_CONTACT_PERSON_FISCALCODE=${SATOSA_CONTACT_PERSON_FISCALCODE:-XXXXXX00X00X000Y}
      - SATOSA_CONTACT_PERSON_GIVEN_NAME=${SATOSA_CONTACT_PERSON_GIVEN_NAME:-Contact Me}
      - SATOSA_CONTACT_PERSON_IPA_CODE=${SATOSA_CONTACT_PERSON_IPA_CODE:-ipa00c}
      - SATOSA_CONTACT_PERSON_MUNICIPALITY=${SATOSA_CONTACT_PERSON_MUNICIPALITY:-H501}
      - SATOSA_ORGANIZATION_DISPLAY_NAME_EN=${SATOSA_ORGANIZATION_DISPLAY_NAME_EN:-Example Organization}
      - SATOSA_ORGANIZATION_DISPLAY_NAME_IT=${SATOSA_ORGANIZATION_DISPLAY_NAME_IT:-Example Organization}
      - SATOSA_ORGANIZATION_NAME_EN=${SATOSA_ORGANIZATION_NAME_EN:-example_organization}
      - SATOSA_ORGANIZATION_NAME_IT=${SATOSA_ORGANIZATION_NAME_IT:-example_organization}
      - SATOSA_ORGANIZATION_URL_EN=${SATOSA_ORGANIZATION_URL_EN:-https://example_organization.org}
      - SATOSA_ORGANIZATION_URL_IT=${SATOSA_ORGANIZATION_URL_IT:-https://example_organization.org/it}
      - SATOSA_UI_DESCRIPTION_EN=${SATOSA_UI_DESCRIPTION_EN:-Resource description}
      - SATOSA_UI_DESCRIPTION_IT=${SATOSA_UI_DESCRIPTION_IT:-Resource description}
      - SATOSA_UI_DISPLAY_NAME_EN=${SATOSA_UI_DISPLAY_NAME_EN:-Resource Display Name}
      - SATOSA_UI_DISPLAY_NAME_IT=${SATOSA_UI_DISPLAY_NAME_IT:-Resource Display Name}
      - SATOSA_UI_INFORMATION_URL_EN=${SATOSA_UI_INFORMATION_URL_EN:-https://example_organization.org/information_url}
      - SATOSA_UI_INFORMATION_URL_IT=${SATOSA_UI_INFORMATION_URL_IT:-https://example_organization.org/it/information_url}
      - SATOSA_UI_LOGO_HEIGHT=${SATOSA_UI_LOGO_HEIGHT:-60}
      - SATOSA_UI_LOGO_WIDTH=${SATOSA_UI_LOGO_WIDTH:-80}
      - SATOSA_UI_LOGO_URL=${SATOSA_UI_LOGO_URL:-https://example_organization.org/logo.png}
      - SATOSA_UI_PRIVACY_URL_EN=${SATOSA_UI_PRIVACY_URL_EN:-https://example_organization.org/privacy}
      - SATOSA_UI_PRIVACY_URL_IT=${SATOSA_UI_PRIVACY_URL_IT:-https://example_organization.org/it/privacy}
      - SATOSA_USER_ID_HASH_SALT=${SATOSA_USER_ID_HASH_SALT:-CHANGE_ME!}

      - PYEUDIW_FEDERATION_CLIENT_ID=${PYEUDIW_FEDERATION_CLIENT_ID:-openid_federation:https://${SATOSA_HOSTNAME:-localhost}/OpenID4VP}
      - PYEUDIW_X509_CLIENT_ID=${PYEUDIW_X509_CLIENT_ID:-x509_san_dns:${SATOSA_HOSTNAME:-localhost}}
    expose:
      - 10000
    ports:
      - "10000:10000"
    volumes:
      - ./iam-proxy-italia-project:/satosa_proxy:rwx
      - ./pyeudiw-healthcheck.sh:/satosa_proxy/pyeudiw-healthcheck.sh:ro
      #- ./eudi-wallet-it-python/pyeudiw:/.venv/lib/python3.12/site-packages/pyeudiw:rwx
      # - iam-proxy-italia-data:/satosa_proxy # to be used for external volumes
    working_dir: /satosa_proxy
    entrypoint: "sh entrypoint.sh"
    networks:
      - iam-proxy-italia
    healthcheck:
      test: ["CMD", "sh", "pyeudiw-healthcheck.sh"]
      interval: 30s
      retries: 10
      start_period: 30s
      timeout: 10s

  satosa-nginx:
    image: nginx:alpine
    container_name: satosa-nginx
    depends_on:
      iam-proxy-italia:
        condition: service_started
      satosa-certbot:
        condition: service_completed_successfully
    ports:
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./certbot/archive:/etc/archive:ro
      - ./certbot/live/${SATOSA_HOSTNAME:-localhost}:/etc/nginx/certs:ro
      # - static:/usr/share/nginx/html # to be used for external volumes
    networks:
      iam-proxy-italia:
        aliases:
          - ${SATOSA_HOSTNAME:-localhost}
    environment:
      - NGINX_HOST=${SATOSA_HOSTNAME:-localhost}
      - TZ=${TZ:-Europe/Rome}

  spid-samlcheck:
    profiles:
      - demo
      - dev
    image: italia/spid-saml-check:1.11.1
    container_name: spid-samlcheck
    ports:
      - "8443:8443"
    networks:
      - iam-proxy-italia

  satosa-certbot:
    image: certbot/certbot
    container_name: satosa-certbot
    environment:
      - CERTBOT_ENABLED=${SATOSA_CERTBOT_ENABLED:-true}
      - CERTBOT_EMAIL=${SATOSA_CONTACT_PERSON_EMAIL_ADDRESS:-support.example@organization.org}
      - HOSTNAME=${SATOSA_HOSTNAME:-satosa-nginx.example.org}
      - CERT_METHOD=${CERT_METHOD:-local}
      - CERTBOT_KTY=${CERTBOT_KTY:-3072}
      - CERTBOT_DAYS=${CERTBOT_DAYS:-365}
      - TZ=${TZ:-Europe/Rome}
    volumes:
      - ./certbot:/etc/letsencrypt
      - ./nginx/html:/var/www/certbot
    networks:
      - iam-proxy-italia
    ports:
      - "80:80"
    entrypoint: "sh /etc/letsencrypt/certbot.sh"

  trust-anchor:
    profiles:
      - demo
      - mongo
    <<: *django-common
    container_name: trust-anchor
    build:
      <<: *django-build
      args:
        MODULE_NAME: federation_authority
        RUNNING_PORT: 5002
    ports:
      - "5002:5002"
    volumes:
      - ./spid_cie_oidc_django/federation_authority:/django-project:rw
    networks:
      iam-proxy-italia:
        aliases:
          - ${TRUST_ANCHOR_HOSTNAME:-trust-anchor.example.org}
    healthcheck:
      test: [ "CMD", "/bin/bash", "/healthcheck.sh", "http://${TRUST_ANCHOR_HOSTNAME:-trust-anchor.example.org}:5002"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      TRUST_ANCHOR_URL: ${TRUST_ANCHOR_URL:-http://trust-anchor.example.org:5002}
      PROVIDER_URL: ${PROVIDER_URL:-http://cie-provider.example.org:8002}
      RP_URL: "https://${SATOSA_HOSTNAME:-satosa-nginx.example.org}/CieOidcRp"

  cie-provider:
    profiles:
      - demo
      - mongo
    <<: *django-common
    container_name: cie-provider
    build:
      <<: *django-build
      args:
        MODULE_NAME: provider
        RUNNING_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ./spid_cie_oidc_django/provider:/django-project
    networks:
      iam-proxy-italia:
        aliases:
          - ${CIE_PROVIDER_HOSTNAME:-cie-provider.example.org}
    depends_on:
      - trust-anchor
    healthcheck:
      test: [ "CMD", "/bin/bash", "/healthcheck.sh" , "http://${CIE_PROVIDER_HOSTNAME:-cie-provider.example.org}:8002/oidc/op"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      TRUST_ANCHOR_URL: ${TRUST_ANCHOR_URL:-http://trust-anchor.example.org:5002}
      PROVIDER_URL: ${PROVIDER_URL:-http://cie-provider.example.org:8002}
      RP_URL: "https://${SATOSA_HOSTNAME:-satosa-nginx.example.org}/CieOidcRp"

  relying-party-demo:
    profiles:
      - demo
      - mongo
    <<: *demo-rp-common
    container_name: relying-party-demo
    build:
      <<: *demo-rp-build
    ports:
      - "8090:8090"
    networks:
      iam-proxy-italia:
        aliases:
          - demo-rp.example.org
    depends_on:
      iam-proxy-italia:
        condition: service_healthy
    environment:
      HOST: relying-party-demo
      RUNNING_PORT: 8090
      WELL_KNOW_OPENID_CONFIGURATION: "${WELL_KNOW_OPENID_CONFIGURATION}"
      URL_CALLBACK: "http://${DEMO_RELYING_PARTY_FQDN:-localhost}/authz_cb/satosa"


networks:
  iam-proxy-italia:
    name: iam-proxy-italia

