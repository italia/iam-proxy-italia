<!DOCTYPE html>
<html lang="it">

<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title id="tab-title"></title>
  <meta name="description" content="">
  <link rel="shortcut icon" href="spid/favicon-32x32.png">

  <link rel="stylesheet" href="./css/style.css">
  <link href="./css/bootstrap-italia.min.css" rel="stylesheet">
  <link href="./css/ita.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next@25.5.2/i18next.min.js"></script>
  <script src="js/bootstrap-italia.bundle.min.js"></script>
</head>

<body>
  <!-- HEADER (same structure as disco.html) -->
  <header class="it-header-wrapper">
    <div class="it-header-slim-wrapper bg-primary">
      <div class="container">
        <div class="it-header-slim-wrapper-content d-flex justify-content-between align-items-center">
          <span class="navbar-brand text-white"><strong id="header-region-name"></strong></span>
          <div>
            <select id="lang-select" class="form-select form-select-sm text-white">
              <option value="it" selected>ITA</option>
              <option value="en">EN</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="header-title-section">
      <div class="container py-3">
        <div class="d-flex align-items-center">
          <svg class="icon icon-lg" aria-hidden="true">
            <use xlink:href="./svg/sprites.svg#it-code-circle"></use>
          </svg>

          <span class="navbar-separator" aria-hidden="true"></span>
          
          <img src="img/IT-Wallet-Logo-Primary-BlueItalia.svg" alt="IT-Wallet" class="it-wallet-navbar-logo me-2" height="32">

        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container my-4">
    <h3 class="text-center mb-4" id="page-title">Seleziona il tuo IT-Wallet</h3>

    <div class="row mb-4 justify-content-center">
      <div class="col-12 col-md-8">
        <div class="input-group">
          <span class="input-group-text border-end-0">
            <svg class="icon icon-sm" aria-hidden="true"><use href="./svg/sprites.svg#it-search"></use></svg>
          </span>
          <input type="text" id="wallet-search" class="form-control border-start-0" placeholder="Cerca per nome" aria-label="Cerca wallet per nome">
          <button class="btn btn-primary" type="button" id="search-btn">Cerca</button>
        </div>
      </div>
    </div>

    <div id="wallet-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 justify-content-center align-items-start">
      <!-- Wallet cards rendered by it-wallet-loader.js -->
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-outline-primary" id="load-more-btn" style="display: none;">Carica altri</button>
      <div class="mt-3">
        <a href="#" id="back-link">Indietro</a>
      </div>
    </div>
  </main>

  <!-- IT-Wallet info section (grounded to footer, like eid-alternative-section in disco) -->
  <div class="py-4 it-wallet-info-section">
    <div class="container d-flex justify-content-center">
      <div class="d-flex align-items-center flex-nowrap">
        <img src="img/IT-Wallet-Symbol-Primary-BlueItalia.svg" alt="" class="it-wallet-info-icon" width="32" height="38" aria-hidden="true">
        <p class="mb-0" id="info-what-is">Non sai cos'è IT-Wallet?</p>
        <a href="https://identitadigitale.gov.it/" target="_blank" rel="noopener" id="info-learn-more" class="text-decoration-none text-nowrap">
          <span id="info-learn-more-text">Scopri di più</span>
          <svg class="icon icon-sm ms-1" aria-hidden="true"><use href="./svg/sprites.svg#it-external-link"></use></svg>
        </a>
      </div>
    </div>
  </div>

  <!-- FOOTER (same structure as disco.html) -->
  <footer>
    <div class="container h-100 d-flex align-items-center">
      <div class="d-flex flex-wrap justify-content-start">
        <a id="footer-legal" href="" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-privacy" href="" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-accessibility" href="" class="text-white mb-2" target="_blank" rel="noopener"></a>
      </div>
    </div>
  </footer>

  <script type="module" src="js/it-wallet-loader.js"></script>
</body>

</html>
