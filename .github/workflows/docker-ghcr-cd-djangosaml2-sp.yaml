# Build and publish the djangosaml2_sp Docker image to GHCR.
# Separate from the main iam-proxy-italia image workflow.

name: Publish djangosaml2_sp Docker image

on:
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-djangosaml2-sp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_SECRET }}

      - name: Extract metadata (tags, labels) for djangosaml2_sp
        id: meta-django
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/iam-proxy-italia-djangosaml2_sp

      - name: Build and push djangosaml2_sp Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: iam-proxy-italia-project-demo-examples/django.Dockerfile
          push: true
          tags: ${{ steps.meta-django.outputs.tags }}
          labels: ${{ steps.meta-django.outputs.labels }}
