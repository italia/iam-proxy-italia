# CIE OIDC backend: pytest and coverage
# Runs in a separate workflow from the main build/lint/SAML tests.

name: CIE OIDC backend

on:
  push:
    branches: [ master, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'iam-proxy-italia-project/static/**'
      - 'Docker-compose/nginx/html/static/**'
  pull_request:
    branches: [ master, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'iam-proxy-italia-project/static/**'
      - 'Docker-compose/nginx/html/static/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5.3.1
        with:
          skip_after_successful_duplicate: 'true'
          concurrent_skipping: 'same_content_newer'

  coverage:
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    name: Coverage (CIE OIDC backend) py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Patch pyproject.toml if matching branch exists in eudi-wallet-it-python
        env:
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          TARGET_BRANCH: ${{ github.base_ref || 'master' }}
          DEPTH_COMMITS: 50
        run: bash .github/scripts/patch-pyeudiw-branch.sh

      - name: Install dependencies with Poetry
        run: |
          pip install "poetry>=2.3.3"
          poetry install --extras test

      - name: Run pytest with coverage
        env:
          PYTHONPATH: iam-proxy-italia-project
        run: |
          poetry run pytest iam-proxy-italia-project/backends/cieoidc/tests/ \
            --cov=backends.cieoidc \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/

      - name: Coverage summary
        env:
          PYTHONPATH: iam-proxy-italia-project
        run: |
          echo "## Coverage report (CIE OIDC backend)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          poetry run pytest iam-proxy-italia-project/backends/cieoidc/tests/ --cov=backends.cieoidc --cov-config=pyproject.toml --cov-report=term -q >> $GITHUB_STEP_SUMMARY 2>&1
          echo '```' >> $GITHUB_STEP_SUMMARY
