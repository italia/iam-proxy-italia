# Remove GitHub Pages preview subfolder when a branch is deleted.

name: Static Preview Cleanup

on:
  delete:

jobs:
  cleanup:
    if: github.event.ref_type == 'branch'
    name: Remove preview subfolder
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Remove preview subfolder for deleted branch
        if: steps.checkout.outcome == 'success'
        run: |
          BRANCH_REF="${{ github.event.ref }}"
          # ref is e.g. refs/heads/feature-x
          BRANCH_NAME="${BRANCH_REF#refs/heads/}"
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          PREVIEW_DIR="preview/${SAFE_BRANCH}"
          if [ -d "$PREVIEW_DIR" ]; then
            git rm -rf "$PREVIEW_DIR" 2>/dev/null || rm -rf "$PREVIEW_DIR"
            git add -A
            git diff --staged --quiet || git commit -m "Remove preview for deleted branch ${SAFE_BRANCH}"
            git push origin gh-pages
          else
            echo "Preview folder $PREVIEW_DIR does not exist, nothing to remove"
          fi
