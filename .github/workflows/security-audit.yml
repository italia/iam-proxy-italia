# Audit Python dependencies for known vulnerabilities (pip-audit).
# Runs on push/PR to master and dev; fails if any CVEs are found.

name: Security audit

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch pyproject.toml if matching branch exists in eudi-wallet-it-python
        env:
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          TARGET_BRANCH: ${{ github.base_ref || 'master' }}
          DEPTH_COMMITS: 50
        run: bash .github/scripts/patch-pyeudiw-branch.sh

      - name: Install dependencies with Poetry
        run: |
          pip install poetry
          poetry install --extras test

      - name: Install pip-audit
        run: poetry run pip install pip-audit

      - name: Audit dependencies for vulnerabilities
        run: |
          # satosa is from git (peppelinux/SATOSA in pyproject.toml), not PyPI.
          # pip-audit will report "Dependency not found on PyPI ... satosa" — that means
          # "could not look up on PyPI", not "satosa is missing". Expected for git deps.
          #
          # --ignore-vuln rationale:
          # CVE-2024-23342 (ecdsa): Minerva timing side-channel. python-ecdsa considers
          #   side-channel attacks out of scope; no upstream fix exists. Whitelisted per
          #   pymdoccbor documentation — risk accepted.
          # CVE-2026-26007 (cryptography): SECT curves subgroup validation. Fix: 46.0.5.
          #   Cannot add to pyproject.toml: pysaml2 pins cryptography==45.0.7; Poetry
          #   resolver conflicts. Post-install upgrade possible but not in current workflow.
          # CVE-2026-25990 (pillow): PSD out-of-bounds write. Fix: 12.1.1.
          #   Cannot add to pyproject.toml: pyeudiw requires Pillow<12; strict conflict.
          echo ""
          echo "##############################################################################"
          echo "#  ⚠️  Whitelisted CVEs (see workflow comments for rationale)                 #"
          echo "##############################################################################"
          echo ""
          # --cache-dir: use fresh dir to avoid CacheControl "deserialization failed" warnings from pip's incompatible http cache
          poetry run pip-audit --cache-dir /tmp/pip-audit-cache --desc \
            --ignore-vuln CVE-2024-23342 \
            --ignore-vuln CVE-2026-26007 \
            --ignore-vuln CVE-2026-25990
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Whitelisted CVEs" >> $GITHUB_STEP_SUMMARY
          echo "- **CVE-2024-23342 (ecdsa)**: No upstream fix; side-channel out of scope per python-ecdsa." >> $GITHUB_STEP_SUMMARY
          echo "- **CVE-2026-26007 (cryptography)**: Blocked by pysaml2 pin (==45.0.7); fix 46.0.5." >> $GITHUB_STEP_SUMMARY
          echo "- **CVE-2026-25990 (pillow)**: Blocked by pyeudiw (Pillow<12); fix 12.1.1." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** \`satosa\` is installed from git (peppelinux/SATOSA). The \"not found on PyPI\" line for it is expected; pip-audit cannot look up git-installed packages on PyPI." >> $GITHUB_STEP_SUMMARY

  audit-djangosaml2-sp:
    name: pip-audit (djangosaml2_sp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit djangosaml2_sp dependencies for vulnerabilities
        run: |
          # --cache-dir: use fresh dir to avoid CacheControl "deserialization failed" warnings
          pip-audit --cache-dir /tmp/pip-audit-cache -r iam-proxy-italia-project-demo-examples/djangosaml2_sp/requirements.txt --desc
