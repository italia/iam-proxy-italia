apiVersion: v2
name: iam-proxy-italia
description: |
  IAM Proxy Italia is the distribution of the SATOSA IAM Proxy allowing
  SAML-to-SAML, OIDC-to-SAML, SAML-to-Wallet and OIDC-to-Wallet
  interoperability with the  Italian Digital Identity Systems.
version: 0.1.0
appVersion: "v3.3"

dependencies:
  - name: mongodb
    version: 19.1.13
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
