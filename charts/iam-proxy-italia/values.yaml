# PYEUDIW configuration
pyeudiw:
  # Federation client ID (leave empty to auto-generate from hostname)
  federationClientId: ""
  # X509 client ID (leave empty to auto-generate from hostname)
  x509ClientId: ""

# SATOSA proxy_conf.yaml configuration
proxyConf:
  cookieStateName: "SATOSA_STATE"
  contextStateDelete: true
  cookieMaxAge: 600
  # Optional cookie settings (only included if set)
  cookieSecure: ""
  cookieHttponly: ""
  cookieSamesite: ""
  cookiesSamesiteCompat:
    - ["SATOSA_STATE", "SATOSA_STATE_LEGACY"]
  customPluginModulePaths:
    - "conf/backends"
    - "conf/frontends"
    - "conf/micro_services"
  backendModules:
    #- "conf/backends/saml2_backend.yaml"
    - "conf/backends/spidsaml2_backend.yaml"
    #- "conf/backends/ciesaml2_backend.yaml"
    #- "conf/backends/pyeudiw_backend.yaml"
    - "conf/backends/cieoidc_backend.yaml"
  frontendModules:
    #- "conf/frontends/saml2_frontend.yaml"
    - "conf/frontends/oidcop_frontend.yaml"
    #- "conf/frontends/openid4vci_frontend.yaml"
  microServices:
    - "conf/microservices/idp_hinting.yaml"
    - "conf/microservices/disco_to_target_issuer.yaml"
    - "conf/microservices/target_based_routing.yaml"
  logging:
    version: 1
    formatters:
      simple:
        format: "[%(asctime)-19.19s] [%(levelname)-5.5s]: %(message)s [%(name)s.%(funcName)s:%(lineno)s]"
      syslog:
        format: "[SATOSA] [%(name)s] [%(levelname)s]: %(message)s"
    handlers:
      console:
        class: logging.StreamHandler
        level: DEBUG
        formatter: simple
        stream: ext://sys.stdout
    loggers:
      satosa:
        level: INFO
        formatter: simple
        handlers: [console]
        propagate: false
      saml2:
        level: ERROR
        formatter: simple
        handlers: [console]
        propagate: false
      "satosa.frontends.saml2":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false
      "satosa.backends.saml2":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false
      "satosa.frontends.idpy_oidcop":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false
      "satosa_oidcop.idpy_oidcop":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false
      "satosa_oidcop.core.storage.mongo":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false
      "backends.spidsaml2":
        level: INFO
        formatter: simple
        handlers: [console]
        propagate: false
      "backends.ciesaml2":
        level: INFO
        formatter: simple
        handlers: [console]
        propagate: false
      "pyeudiw.satosa.backend":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false
      "backends.cieoidc":
        level: DEBUG
        formatter: simple
        handlers: [console]
        propagate: false

