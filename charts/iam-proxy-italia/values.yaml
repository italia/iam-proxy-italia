# Default values for iam-proxy-italia.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/italia/iam-proxy-italia
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Container command and args configuration
container:
  command: ["/bin/bash", "-ec"]

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 10000

# Static files server — a separate Deployment/Service that serves assets under `staticPath`.
staticFiles:
  # Number of replicas for the static server.
  replicaCount: 1
  image:
    # Image repository. Defaults to <image.repository>-static when empty.
    repository: ""
    pullPolicy: IfNotPresent
    # Image tag. Defaults to the same tag as the main image when empty.
    tag: ""
  # URL path prefix served by the static server (keep in sync with SATOSA_BASE_STATIC).
  staticPath: /static
  # URL of the static storage.
  externalUrl: ""
  service:
    port: 8000
  resources: {}

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations:
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/large-client-header-buffers: 4 16k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
    - name: gateway
      sectionName: http
      # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
    - chart-example.local
  # List of rules and filters applied.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Configuration files volume
# If existingConfigMap is set, uses that ConfigMap
# If empty, auto-generates ConfigMap from files in config-files/ directory
configVolume:
  # Mount path in the container
  mountPath: /satosa_proxy
  # Name of existing ConfigMap to use (leave empty for auto-generated)
  existingConfigMap: ""

nodeSelector: {}

tolerations: []

affinity: {}

# Timezone configuration
timezone: "Europe/Rome"

# SATOSA configuration
satosa:
  # Hostname for the SATOSA service
  hostname: "localhost"
  # Enable debug mode
  debug: false
  # Running in Docker container
  byDocker: true
  # Base directory for SATOSA
  baseDir: /satosa_proxy

  # Metadata fetching flags
  getIdemMdqKey: false
  getSpidIdpMetadata: false
  getFicepIdpMetadata: false
  getCieIdpMetadata: false

  keys:
    mountPath: /satosa_proxy/pki
    privateKeyFilename: privkey.pem
    publicKeyFilename: cert.pem
    # Volume name to mount (leave empty to create Secret from privateKey/publicKey)
    existingVolume: ""
    # PEM content (used only if existingVolume is empty)
    privateKey: ""
    publicKey: ""

  # Encryption configuration
  # These values will be stored in a Kubernetes Secret
  encryptionKey: ""
  salt: ""
  stateEncryptionKey: ""
  userIdHashSalt: ""

# MongoDB configuration
mongodb:
  enabled: true
  auth:
    enabled: true
    # User configuration (index 0 = frontend, index 1 = backend)
    usernames:
      - satosa # OIDC Frontend user
      - satosa # OIDC Backend user
    databases:
      - oidcop # OIDC Frontend database
      - cie_oidc # OIDC Backend database
    # Passwords for users (index 0 = frontend, index 1 = backend)
    passwords:
      - CHANGE_ME!
      - CHANGE_ME!
  initdbScripts:
    init-indexes.js: |
      const rootUser = process.env.MONGODB_ROOT_USER;
      const rootPassword = process.env.MONGODB_ROOT_PASSWORD;

      const admin = db.getSiblingDB('admin');

      admin.auth(rootUser, rootPassword);

      use oidcop

      db.createCollection('client')

      // make client_id unique
      db.client.createIndex( { "client_id": 1 }, { unique: true } )
      db.client.createIndex( { "registration_access_token": 1 }, { unique: true } )

      db.createCollection('session')

      // make access_token and sid unique
      db.session.createIndex( { "sid": 1 }, { unique: true } )

      // create expired session deletion
      db.session.createIndex(
        { expires_at: 1 },
        { expireAfterSeconds: 0, partialFilterExpression: { count: { $gt: 2 } } }
      );
  # Backend collection names (shared between internal and external MongoDB)
  cieOidcBackend:
    collections:
      authentication: "cie_oidc_authentication"
      authenticationToken: "cie_oidc_authentication_token"
      users: "cie_oidc_users"
  # External MongoDB configuration (used when enabled: false)
  # Note: usernames, passwords, and databases are taken from mongodb.auth.* arrays
  # where index 0 = frontend and index 1 = backend
  external:
    cieOidcBackend:
      host: "satosa-mongo"
      port: 27017
    oidcopFrontend:
      host: "satosa-mongo"
      port: 27017
      # Username is taken from mongodb.auth.usernames[0]
      # Password is taken from mongodb.auth.passwords[0]
      # Database is taken from mongodb.auth.databases[0]

