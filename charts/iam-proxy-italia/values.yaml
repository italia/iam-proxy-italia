# uWSGI configuration
uwsgi:
  socket: "0.0.0.0:10000"
  # In K8s prefer processes: 1 and scale horizontally via replicaCount/HPA
  processes: 1
  # Enable uWSGI master process. When processes: 1, set to false to avoid an extra supervisor process
  master: false
  # Run all apps in the same interpreter (recommended for single-process K8s deployments)
  singleInterpreter: true
  listen: 2048
  maxRequests: 512
  harakiri: 20
  bufferSize: 32768
  logMasterBufsize: 128000

# Secret configuration for sensitive data
# If existingSecret is not set, a new secret will be created automatically
# When using an existing secret, it must contain the following keys:
# - satosa-encryption-key
# - satosa-salt
# - satosa-state-encryption-key
# - satosa-user-id-hash-salt
# - mongodb-password
# - mongodb-backend-password
# - mongodb-frontend-password
oidcop:
  # Provide either an existing secret name or leave empty to create a new one.
  # The secret must contain privateJwks and publicJwks keys.
  existingSecret: ""
  # If existingSecret is not set, provide privateJwks and publicJwks keys here.
  privateJwks: ""
  publicJwks: ""
  # Mount path for the secret volume.
  mountPath: /satosa_proxy/data

secret:
  # The name of the secret to use.
  # If not set, a name is generated using the fullname template
  name: ""
  # Use an existing secret instead of creating a new one
  # When set, the secret will not be created and values from the existing secret will be used
  existingSecret: ""
  # Annotations to add to the created secret (only used when creating a new secret)
  annotations: {}

openid:
  federation:
    resolveEndpoint: "resolve"
    legalInformationUri: "en/website/legal-information"
  rp:
    jwksUri: "openid_relying_party/jwks.json"
    signedJwksUri: "openid_relying_party/jwks.jose"
    callbackUri: "oidc/callback"

backendsConfig:
  cieoidc: |
    module: backends.cieoidc.CieOidcBackend
    name: CieOidcRp
    config:
      network:
        httpc_params: &httpc_params
          connection:
            ssl: true
          session:
            timeout: 6
      storage: &db_config
        mongo_db:
          module: backends.cieoidc.storage.impl.mongo_storage
          class: MongoStorage
          init_params:
            url: !ENV MONGO_CIE_OIDC_BACKEND_HOST
            conf:
              db_name: !ENV MONGO_CIE_OIDC_BACKEND_DB_NAME
              db_auth_collection: !ENV MONGO_CIE_OIDC_BACKEND_AUTH_COLLECTION
              db_token_collection: !ENV MONGO_CIE_OIDC_BACKEND_TOKEN_COLLECTION
              db_user_collection: !ENV MONGO_CIE_OIDC_BACKEND_USER_COLLECTION
              db_trust_chain_collection: !ENV MONGO_CIE_OIDC_BACKEND_TRUST_CHAIN_COLLECTION
              data_ttl: 63072000 # 2 years
            connection_params:
              username: !ENV MONGODB_CIE_OIDC_BACKEND_USERNAME
              password: !ENV MONGODB_CIE_OIDC_BACKEND_PASSWORD
              authSource: cie_oidc

      providers:
        - !ENV OPENID_CIE_PROVIDER_URL # http://cie-provider.example.org:8002/oidc/op

      security_operations:
        hash:
          default:
            func: SHA-256 #DEFAULT_HASH_FUNC
        sign:
          default:
            alg: &default_sign_alg "RS256" #DEFAULT_JWS_ALG # or RS256. Please note that this signature alg MUST be compliant with the private keys used for the signature. X.509 certificates MUST be therefore ECDSA using ES, and RSA using RS
          supported:
            alg: &supported_sign_alg #SIGNING_ALG_VALUES_SUPPORTED
              - RS256
              - RS384
              - RS512
              - ES256
              - ES384
              - ES512
        encrypt:
          default:
            alg: &default_enc_alg RSA-OAEP #DEFAULT_JWE_ALG
            enc: &default_enc_enc A256CBC-HS512 #DEFAULT_JWE_ENC
          supported:
            alg: &supported_enc_alg #ENCRYPTION_ALG_VALUES_SUPPORTED
              - RSA-OAEP
              - RSA-OAEP-256
              - ECDH-ES
              - ECDH-ES+A128KW
              - ECDH-ES+A192KW
              - ECDH-ES+A256KW
            enc: &supported_enc_enc #ENCRYPTION_ENC_SUPPORTED
              - A128CBC-HS256
              - A192CBC-HS384
              - A256CBC-HS512
              - A128GCM
              - A192GCM
              - A256GCM

