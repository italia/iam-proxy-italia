        authorization_endpoint:
          module: backends.cieoidc.endpoints.authorization_endpoint
          class: AuthorizationHandler
          routes:
            - /oidc/authorization
          config:
            db_config: *db_config
            entity_type: openid_relying_party
            entity_configuration_exp: 2800
