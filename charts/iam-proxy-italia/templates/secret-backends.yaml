{{- if and .Values.backendsConfig (not .Values.configVolume.existingConfigMap) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iam-proxy-italia.fullname" . }}-backends-config
  labels:
    {{- include "iam-proxy-italia.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.backendsConfig }}
  {{ $key }}_backend.yaml: |
{{ $val | indent 4 }}
  {{- end }}
{{- end }}
