{{- if .Values.staticFiles.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iam-proxy-italia.staticFullname" . }}
  labels:
    {{- include "iam-proxy-italia.labels" . | nindent 4 }}
    app.kubernetes.io/component: static
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.staticFiles.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "iam-proxy-italia.staticSelectorLabels" . | nindent 4 }}
{{- end }}
